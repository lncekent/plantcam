<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>PlantCam - Library</title>
    <link href="inter.css" rel="stylesheet" />
    <style>
      :root {
        --color-primary: #006e28;
        --color-primary-container: #34c759;
        --color-secondary-container: #b9f474;
        --color-secondary-text: #437000;
        --color-tertiary: #9c413d;
        --color-on-surface: #131e14;
        --color-on-surface-variant: #3d4a3c;
        --color-outline: #6d7b6b;
        --color-outline-variant: #bccbb8;
        --color-surface-highest: #f1f5f1;
        --color-surface-high: #f0f6f0;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      a:focus,
      button:focus,
      input:focus {
        outline: none;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        line-height: 1;
      }

      .icon-filled {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

      .botanical-shadow {
        box-shadow: 0 8px 32px rgba(19, 30, 20, 0.06);
      }

      body {
        min-height: max(884px, 100dvh);
        font-family: "Inter", sans-serif;
        background: #ffffff;
        color: var(--color-on-surface);
        padding-bottom: 96px;
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .top-app-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        height: 64px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
      }

      .brand-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .brand-logo {
        display: block;
        width: auto;
        height: 1.5rem;
        flex-shrink: 0;
      }

      .brand-icon,
      .brand-title {
        color: var(--color-primary);
      }

      .brand-title {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .top-menu-btn {
        border: 0;
        background: transparent;
        color: rgba(19, 30, 20, 0.6);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: transform 0.2s ease;
        padding: 0;
      }

      .top-menu-btn:active {
        transform: scale(0.95);
      }

      .top-menu-wrap {
        position: relative;
      }

      .settings-menu {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        width: 172px;
        padding: 6px;
        border-radius: 14px;
        border: 1px solid rgba(188, 203, 184, 0.5);
        background: #ffffff;
        box-shadow: 0 12px 28px rgba(19, 30, 20, 0.14);
        display: none;
        z-index: 70;
        font-family: inherit;
      }

      .settings-menu.is-open {
        display: block;
      }

      .settings-menu a {
        display: block;
        width: 100%;
        border-radius: 10px;
        padding: 10px 12px;
        text-align: left;
        font-size: 0.875rem;
        font-family: inherit;
        font-weight: 500;
        line-height: 1.35;
        color: var(--color-on-surface);
        background: transparent;
        cursor: pointer;
        transition: background 0.2s ease;
        text-decoration: none;
      }

      .settings-menu a:hover {
        background: var(--color-surface-high);
      }

      .main-content {
        max-width: 1280px;
        margin: 0 auto;
        padding: 72px 24px 40px;
      }

      .page-header {
        padding: 0 0 10px;
        margin-bottom: 8px;
      }

      .page-header h2 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 700;
        color: rgba(19, 30, 20, 0.8);
      }

      .hero-section {
        position: relative;
        width: 100%;
        height: 224px;
        border-radius: 24px;
        overflow: hidden;
        margin: 8px 0 32px;
      }

      .hero-bg,
      .hero-bg img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .hero-bg img {
        object-fit: cover;
        filter: brightness(0.75) blur(1px);
      }

      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.7),
          rgba(0, 0, 0, 0.2),
          transparent
        );
      }

      .hero-copy {
        position: relative;
        z-index: 1;
        height: 100%;
        padding: 32px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      .hero-copy h3 {
        margin: 0 0 4px;
        color: #ffffff;
        font-size: clamp(1.75rem, 2.3vw, 3rem);
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .hero-copy p {
        margin: 0;
        color: rgba(255, 255, 255, 0.9);
        font-size: clamp(0.875rem, 1.2vw, 1.125rem);
        font-weight: 500;
      }

      .controls-section {
        margin-bottom: 40px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .search-wrap {
        position: relative;
        max-width: 640px;
      }

      .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-outline);
      }

      .search-input {
        width: 100%;
        padding: 16px 16px 16px 48px;
        border: 0;
        border-radius: 12px;
        background: var(--color-surface-highest);
        color: var(--color-on-surface);
        font-size: 0.9rem;
        outline: none;
        transition:
          box-shadow 0.2s ease,
          background 0.2s ease;
      }

      .search-input::placeholder {
        color: var(--color-outline);
      }

      .search-input:focus {
        background: #ffffff;
        box-shadow: 0 0 0 1px rgba(0, 110, 40, 0.35);
      }

      .chip-row {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 8px;
      }

      .chip {
        border: 0;
        border-radius: 999px;
        padding: 10px 24px;
        font-size: 0.875rem;
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      .chip:hover {
        opacity: 0.82;
      }

      .chip-active {
        background: var(--color-primary);
        color: #ffffff;
      }

      .chip-secondary {
        background: var(--color-secondary-container);
        color: var(--color-secondary-text);
      }

      .chip-muted {
        background: var(--color-surface-highest);
        color: var(--color-on-surface-variant);
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 24px;
      }

      .plant-card {
        background: #ffffff;
        border: 1px solid rgba(188, 203, 184, 0.3);
        border-radius: 24px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
      }

      .plant-card:hover {
        transform: scale(1.02);
      }

      .plant-image-wrap {
        position: relative;
        height: 256px;
        overflow: hidden;
      }

      .plant-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }

      .plant-card:hover .plant-image {
        transform: scale(1.1);
      }

      .difficulty-badge {
        position: absolute;
        top: 16px;
        left: 16px;
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .difficulty-easy {
        background: var(--color-primary-container);
        color: #004d1a;
      }

      .difficulty-moderate {
        background: var(--color-secondary-container);
        color: var(--color-secondary-text);
      }

      .plant-content {
        padding: 24px;
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      .plant-content h4 {
        margin: 0 0 4px;
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--color-on-surface);
      }

      .plant-latin {
        margin: 0 0 16px;
        color: #3e6a00;
        font-style: italic;
        font-size: 0.75rem;
      }

      .plant-footer {
        margin-top: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .plant-tag {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--color-outline);
        font-weight: 700;
      }

      .plant-arrow {
        border: 0;
        background: transparent;
        color: var(--color-primary);
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .plant-card:hover .plant-arrow {
        transform: translateX(4px);
      }

      .fab-button {
        position: fixed;
        right: 24px;
        bottom: 112px;
        z-index: 40;
        width: 56px;
        height: 56px;
        border: 0;
        border-radius: 999px;
        display: grid;
        place-items: center;
        color: #ffffff;
        cursor: pointer;
        background: linear-gradient(
          135deg,
          var(--color-primary),
          var(--color-primary-container)
        );
        transition: transform 0.2s ease;
      }

      .fab-button:active {
        transform: scale(0.9);
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 50;
        padding: 12px 16px 16px;
        display: flex;
        align-items: center;
        justify-content: space-around;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 24px 24px 0 0;
        backdrop-filter: blur(16px);
        box-shadow: 0 -8px 32px rgba(19, 30, 20, 0.08);
      }

      .nav-item {
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 6px 16px;
        border-radius: 16px;
        color: rgba(19, 30, 20, 0.4);
        transition:
          color 0.2s ease,
          transform 0.2s ease,
          background 0.2s ease;
      }

      .nav-item:hover {
        color: var(--color-primary);
      }

      .nav-item:active {
        transform: scale(0.9);
      }

      .nav-item-active {
        background: rgba(52, 199, 89, 0.1);
        color: var(--color-primary);
      }

      .nav-label {
        margin-top: 4px;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      @media (max-width: 1199px) {
        .card-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 900px) {
        .card-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 600px) {
        .main-content {
          padding-left: 24px;
          padding-right: 24px;
        }

        .hero-copy {
          padding: 24px;
        }

        .card-grid {
          grid-template-columns: 1fr;
        }

        .chip {
          padding-left: 18px;
          padding-right: 18px;
        }
      }
    </style>
  </head>

    <script>
      (function () {
        var settingsToggle = document.getElementById("settingsToggle");
        var settingsMenu = document.getElementById("settingsMenu");

        if (!settingsToggle || !settingsMenu) {
          return;
        }

        function closeMenu() {
          settingsMenu.classList.remove("is-open");
          settingsToggle.setAttribute("aria-expanded", "false");
        }

        function openMenu() {
          settingsMenu.classList.add("is-open");
          settingsToggle.setAttribute("aria-expanded", "true");
        }

        settingsToggle.addEventListener("click", function (event) {
          event.stopPropagation();
          if (settingsMenu.classList.contains("is-open")) {
            closeMenu();
          } else {
            openMenu();
          }
        });

        settingsMenu.addEventListener("click", function (event) {
          event.stopPropagation();
        });

        document.addEventListener("click", closeMenu);

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            closeMenu();
          }
        });

        var menuLinks = settingsMenu.querySelectorAll("a");
        for (var i = 0; i < menuLinks.length; i++) {
          menuLinks[i].addEventListener("click", closeMenu);
        }
      })();
    </script>
