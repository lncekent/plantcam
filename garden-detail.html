<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>PlantCam - Plant Analytics</title>
    <link href="inter.css" rel="stylesheet" />
    <style>
      :root {
        --color-primary: #006e28;
        --color-primary-container: #34c759;
        --color-tertiary: #9c413d;
        --color-on-surface: #131e14;
        --color-on-surface-variant: #3d4a3c;
        --color-outline-variant: #bccbb8;
        --color-surface-highest: #f2f2f2;
        --color-surface-high: #f8f8f8;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      button {
        font-family: inherit;
        border: none;
        cursor: pointer;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
        font-family: "Inter", sans-serif;
        color: var(--color-on-surface);
        min-height: 100dvh;
      }

      .top-app-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        height: 64px;
        padding: 0 24px;
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
      }

      .back-btn {
        background: transparent;
        color: var(--color-primary);
        padding: 8px;
        margin-left: -8px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }

      .back-btn:active {
        background: rgba(0, 0, 0, 0.05);
      }

      .app-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        color: var(--color-primary);
      }

      .brand-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .brand-logo {
        display: block;
        width: auto;
        height: 1.5rem;
        flex-shrink: 0;
      }

      .brand-title {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--color-primary);
      }

      .header-action-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .main-content {
        max-width: 720px;
        margin: 0 auto;
        padding: 84px 24px 140px;
      }

      .top-menu-btn {
        border: 0;
        background: transparent;
        color: rgba(19, 30, 20, 0.6);
        display: grid;
        place-items: center;
        cursor: pointer;
        transition: transform 0.2s ease;
        padding: 0;
      }

      .top-menu-btn:active {
        transform: scale(0.95);
      }

      .top-menu-wrap {
        position: relative;
        margin-left: auto;
      }

      .settings-menu {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        width: 172px;
        padding: 6px;
        border-radius: 14px;
        border: 1px solid rgba(188, 203, 184, 0.5);
        background: #ffffff;
        box-shadow: 0 12px 28px rgba(19, 30, 20, 0.14);
        display: none;
        z-index: 70;
        font-family: inherit;
      }

      .settings-menu.is-open {
        display: block;
      }

      .settings-menu a {
        display: block;
        width: 100%;
        border-radius: 10px;
        padding: 10px 12px;
        text-align: left;
        font-size: 0.875rem;
        font-family: inherit;
        font-weight: 500;
        line-height: 1.35;
        color: var(--color-on-surface);
        background: transparent;
        cursor: pointer;
        transition: background 0.2s ease;
        text-decoration: none;
      }

      .settings-menu a:hover {
        background: var(--color-surface-high);
      }

      /* Hero Analytics */
      .analytics-hero {
        background: var(--color-surface-high);
        border-radius: 32px;
        padding: 24px;
        margin-bottom: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        border: 1px solid rgba(0, 0, 0, 0.03);
      }

      .plant-detail-img {
        width: 120px;
        height: 120px;
        border-radius: 30px;
        object-fit: cover;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      }

      .plant-detail-name {
        font-size: 1.5rem;
        font-weight: 800;
        margin: 0 0 4px;
        letter-spacing: -0.02em;
      }

      .plant-detail-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.875rem;
        font-weight: 700;
        padding: 6px 14px;
        border-radius: 99px;
        margin-bottom: 20px;
      }

      .status-healthy {
        background: rgba(52, 199, 89, 0.1);
        color: var(--color-primary);
      }

      .status-alert {
        background: rgba(156, 65, 61, 0.1);
        color: var(--color-tertiary);
      }

      /* Grid Stats */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        width: 100%;
      }

      .stat-item {
        background: white;
        padding: 16px;
        border-radius: 20px;
        border: 1px solid rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .stat-value {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--color-primary);
      }

      .stat-label {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        color: rgba(0, 0, 0, 0.4);
        letter-spacing: 0.05em;
      }

      /* Growth Section */
      .growth-section {
        background: white;
        border-radius: 24px;
        padding: 20px;
        border: 1px solid rgba(0, 0, 0, 0.05);
        margin-top: 24px;
      }

      .growth-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .growth-title {
        font-weight: 800;
        font-size: 1rem;
      }

      .progress-visual {
        height: 12px;
        background: #f0f0f0;
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 12px;
      }

      .progress-bar {
        height: 100%;
        background: var(--color-primary);
        width: 0%;
        transition: width 1s ease-out;
      }

      .insight-card {
        background: #f0fdf4;
        border: 1px solid rgba(52, 199, 89, 0.2);
        padding: 16px;
        border-radius: 20px;
        margin-top: 24px;
        display: flex;
        gap: 12px;
      }

      .insight-icon {
        color: var(--color-primary);
        flex-shrink: 0;
      }

      .insight-text {
        font-size: 0.875rem;
        line-height: 1.5;
        color: #1e3a1f;
        flex: 1;
      }

      .diagnosis-link-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        padding: 10px 16px;
        background: var(--color-primary);
        color: white;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 700;
        text-decoration: none;
        transition: transform 0.2s ease;
      }

      .diagnosis-link-btn:active {
        transform: scale(0.96);
      }

      .action-row {
        margin-top: 32px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .secondary-btn {
        background: var(--color-surface-high);
        color: var(--color-on-surface);
        padding: 14px;
        border-radius: 16px;
        font-weight: 700;
        text-align: center;
        text-decoration: none;
      }

      .danger-btn {
        background: rgba(156, 65, 61, 0.05);
        color: var(--color-tertiary);
        padding: 14px;
        border-radius: 16px;
        font-weight: 700;
        text-align: center;
      }

      /* Bottom Nav */
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 50;
        padding: 12px 16px 16px;
        display: flex;
        align-items: center;
        justify-content: space-around;
        background: rgba(255, 255, 255, 0.95);
        border-top: 1px solid rgba(188, 203, 184, 0.2);
        border-radius: 24px 24px 0 0;
        backdrop-filter: blur(16px);
        box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.04);
      }

      .nav-item {
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 6px 12px;
        border-radius: 16px;
        color: rgba(19, 30, 20, 0.4);
      }

      .nav-item-active {
        background: rgba(52, 199, 89, 0.1);
        color: var(--color-primary);
      }

      .nav-label {
        margin-top: 4px;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <header class="top-app-bar">
      <div class="brand-wrap">

        <h1 class="brand-title">PlantCam</h1>
      </div>
      <div class="top-menu-wrap">
        <button
          id="settingsToggle"
          class="top-menu-btn"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="settingsMenu"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"

            />
          </svg>
        </button>
        <div
          id="settingsMenu"
          class="settings-menu"
          role="menu"
          aria-label="Settings menu"
        >
          <a id="aboutAppLink" href="about.html" role="menuitem">About App</a>
          <a id="helpLink" href="help.html" role="menuitem">Help/Guide</a>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="header-action-row">
        <button
          class="back-btn"
          onclick="window.location.href = 'my-garden.html'"
          aria-label="Back to Garden"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="currentColor"
          >
            <path
              d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"
            />
          </svg>
        </button>
        <h2 class="app-title">Plant Analytics</h2>
      </div>
      <section class="analytics-hero">
        <img id="plantImg" class="plant-detail-img" src="" alt="Plant" />
        <h2 id="plantName" class="plant-detail-name">Loading...</h2>
        <div id="statusBadge" class="plant-detail-status">
          <span>Checking...</span>
        </div>

        <div class="stats-grid">
          <div class="stat-item">
            <span id="statConfidence" class="stat-value">--%</span>
            <span class="stat-label">Confidence</span>
          </div>
          <div class="stat-item">
            <span id="statScanned" class="stat-value">--/--</span>
            <span class="stat-label">Scanned Date</span>
          </div>
        </div>
      </section>

      <div class="insight-card">
        <span class="material-symbols-outlined insight-icon"
          >tips_and_updates</span
        >
        <div class="insight-text">
          <strong id="insightTitle">Expert Tip:</strong>
          <span id="insightBody"
            >Your plant is showing optimal levels of chlorophyll. Keep doing
            what you're doing!</span
          >
          <div id="diagnosisBtnWrap">
             <button id="fullDiagnosisBtn" class="diagnosis-link-btn">
               Review Full Diagnosis
               <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px" fill="currentColor">
                 <path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/>
               </svg>
             </button>
          </div>
        </div>
      </div>

      <div class="action-row">
        <a href="library.html" class="secondary-btn">Open Care Guide</a>
      </div>
    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="index.html">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
          fill="currentColor"
        >
          <path
            d="M240-200h120v-240h240v240h120v-360L480-740 240-560v360Zm-80 80v-480l320-240 320 240v480H520v-240h-80v240H160Zm320-350Z"
          />
        </svg>
        <span class="nav-label">Home</span>
      </a>
      <a class="nav-item" href="history.html">
        <svg

          />
        </svg>
        <span class="nav-label">History</span>
      </a>
      <a class="nav-item nav-item-active" href="my-garden.html">

      <a class="nav-item" href="library.html">

        <span class="nav-label">Library</span>
      </a>

    <script>
      (function () {
        var settingsToggle = document.getElementById("settingsToggle");
        var settingsMenu = document.getElementById("settingsMenu");

        if (!settingsToggle || !settingsMenu) {
          return;
        }

        function closeMenu() {
          settingsMenu.classList.remove("is-open");
          settingsToggle.setAttribute("aria-expanded", "false");
        }

        function openMenu() {
          settingsMenu.classList.add("is-open");
          settingsToggle.setAttribute("aria-expanded", "true");
        }

        settingsToggle.addEventListener("click", function (event) {
          event.stopPropagation();
          if (settingsMenu.classList.contains("is-open")) {
            closeMenu();
          } else {
            openMenu();
          }
        });

        settingsMenu.addEventListener("click", function (event) {
          event.stopPropagation();
        });

        document.addEventListener("click", closeMenu);

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            closeMenu();
          }
        });

        var menuLinks = settingsMenu.querySelectorAll("a");
        for (var i = 0; i < menuLinks.length; i++) {
          menuLinks[i].addEventListener("click", closeMenu);
        }
      })();

      (function () {
        const DETAIL_STORAGE_KEY = "selected_garden_plant";
        const plantImg = document.getElementById("plantImg");
        const plantName = document.getElementById("plantName");
        const statusBadge = document.getElementById("statusBadge");
        const statConfidence = document.getElementById("statConfidence");
        const statScanned = document.getElementById("statScanned");
        const growthPercent = document.getElementById("growthPercent");
        const growthBar = document.getElementById("growthBar");
        const insightTitle = document.getElementById("insightTitle");
        const insightBody = document.getElementById("insightBody");
        const fullDiagnosisBtn = document.getElementById("fullDiagnosisBtn");

        let plant = null;
        try {
          plant = JSON.parse(sessionStorage.getItem(DETAIL_STORAGE_KEY));
        } catch (e) {
          console.error("Failed to load plant data", e);
        }

        if (!plant) {
          window.location.href = "my-garden.html";
          return;
        }

        // Render Data
        plantImg.src =
          plant.image || "https://via.placeholder.com/120?text=Plant";
        plantName.textContent = plant.userName || plant.label || "My Plant";

        const isHealthy =
          plant.label && plant.label.toLowerCase().includes("healthy");
        statusBadge.className =
          "plant-detail-status " +
          (isHealthy ? "status-healthy" : "status-alert");
        statusBadge.innerHTML = isHealthy
          ? "<span>● Healthy</span>"
          : "<span>● Alert</span>";

        statConfidence.textContent = plant.confidence
          ? Math.round(plant.confidence) + "%"
          : "N/A";

        if (plant.scannedAt) {
          const date = new Date(plant.scannedAt);
          statScanned.textContent = date.toLocaleDateString([], {
            month: "short",
            day: "numeric",
          });
        } else {
          statScanned.textContent = "N/A";
        }

        const progress = plant.growthProgress || 0;
        growthPercent.textContent = progress + "%";
        setTimeout(() => {
          growthBar.style.width = progress + "%";
        }, 300);

        // Dynamic Insights
        if (isHealthy) {
          insightTitle.textContent = "Expert Tip:";
          insightBody.textContent =
            "Your " +
            (plant.label || "plant") +
            " is thriving. Maintain current watering schedule.";
        } else {
          insightTitle.textContent = "Action Needed:";
          insightBody.textContent =
            "We detected " +
            (plant.label || "issues") +
            ". Check the Care Guide for treatment steps.";
        }

       // Diagnosis Navigation
        const viewDiagnosisBtn = document.getElementById("viewDiagnosisBtn");
        if (viewDiagnosisBtn) {
          viewDiagnosisBtn.addEventListener("click", () => {
            // Interconnectivity: Pass data to plant-detail.html
            sessionStorage.setItem("plantcam_history_detail", JSON.stringify(plant));
            window.location.href = "plant-detail.html";
          });
        } else {
          console.error("Hindi mahanap ang button. Check mo kung tama yung ID sa HTML.");
        }
      })();
    </script>
  </body>
</html>
