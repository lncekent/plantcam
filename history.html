<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PlantCam - Scan History</title>
    <link href="inter.css" rel="stylesheet" />

    <style>
        :root {
            --color-primary: #006e28;
            --color-primary-container: #34c759;
            --color-tertiary: #9c413d;
            --color-on-surface: #131e14;
            --color-on-surface-variant: #3d4a3c;
            --color-outline-variant: #bccbb8;
            --color-surface-highest: #f2f2f2;
            --color-surface-high: #f8f8f8;
        }


        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        a:focus,
        button:focus,
        input:focus {
            outline: none;
        }


        html,
        body {
            margin: 0;
            padding: 0;
        }

        .botanical-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        body {
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            color: var(--color-on-surface);
            min-height: max(884px, 100dvh);
            -webkit-user-select: none;
            user-select: none;
            /* Prevents text highlighting when long-pressing buttons */
            -webkit-tap-highlight-color: transparent;
            /* Removes the ugly blue box when tapping links */
            touch-action: manipulation;
            /* Optimizes for fast taps and prevents accidental zooming */
        }

        .top-app-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }

        .brand-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo {
            display: block;
            width: auto;
            height: 1.5rem;
            flex-shrink: 0;
        }

        .brand-icon,
        .brand-title {
            color: var(--color-primary);
        }

        .brand-title {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .top-menu-btn {
            border: 0;
            background: transparent;
            color: rgba(19, 30, 20, 0.6);
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .top-menu-btn:active {
            transform: scale(0.95);
        }

        .main-content {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px 132px;
        }

        .search-filter-row {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }

        .search-box {
            position: relative;
            flex: 1;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(61, 74, 60, 0.5);
        }

        .search-input {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 48px;
            border: 0;
            border-radius: 16px;
            background: var(--color-surface-highest);
            color: var(--color-on-surface);
            font-size: 0.875rem;
            transition: box-shadow 0.2s ease, background 0.2s ease;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(61, 74, 60, 0.4);
        }

        .search-input:focus {
            background: #ffffff;
            box-shadow: 0 0 0 1px rgba(0, 110, 40, 0.35);
        }

        .filter-button {
            width: 48px;
            height: 48px;
            border: 0;
            border-radius: 16px;
            display: grid;
            place-items: center;
            cursor: pointer;
            background: var(--color-surface-highest);
            color: var(--color-primary);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .filter-button:hover {
            background: var(--color-surface-high);
        }

        .filter-button:active {
            transform: scale(0.95);
        }

        .selection-row {
            margin-bottom: 32px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .select-all {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .section-checkbox {
            width: 20px;
            height: 20px;
            margin: 0;
            border-radius: 6px;
            border: 1px solid var(--color-outline-variant);
            accent-color: var(--color-primary);
            cursor: pointer;
        }

        .select-text {
            font-size: 0.875rem;
            font-weight: 600;
            color: rgba(61, 74, 60, 0.8);
            transition: color 0.2s ease;
        }

        .select-all:hover .select-text {
            color: var(--color-primary);
        }

        .delete-selected {
            border: 0;
            background: transparent;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 999px;
            color: var(--color-tertiary);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .delete-selected:hover {
            background: rgba(156, 65, 61, 0.1);
        }

        .delete-selected:active {
            transform: scale(0.95);
        }

        .history-sections {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .day-heading {
            margin: 0 0 16px;
            padding: 0 8px;
            display: flex;
            align-items: center;
        }

        .day-title {
            margin: 0;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(61, 74, 60, 0.6);
        }

        .day-divider {
            height: 1px;
            flex: 1;
            margin-left: 16px;
            background: rgba(188, 203, 184, 0.2);
        }

        .entry-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .entry-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 24px;
            border: 1px solid rgba(188, 203, 184, 0.1);
            background: #ffffff;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .entry-card:hover {
            border-color: rgba(0, 110, 40, 0.2);
        }

        .entry-card:active {
            transform: scale(0.99);
        }

        .entry-image-wrap {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .entry-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .entry-copy {
            flex: 1;
            min-width: 0;
            padding: 4px 0;
        }

        .entry-name {
            margin: 0 0 2px;
            font-size: 15px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-stack {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            flex-shrink: 0;
        }

        .status-dot-healthy {
            background: var(--color-primary);
        }

        .status-dot-alert {
            background: var(--color-tertiary);
        }

        .status-text {
            margin: 0;
            font-size: 12px;
            font-weight: 700;
        }

        .status-text-healthy {
            color: var(--color-primary);
        }

        .status-text-alert {
            color: var(--color-tertiary);
        }

        .entry-time {
            margin: 0 0 0 14px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(61, 74, 60, 0.5);
        }

        .entry-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .icon-button {
            border: 0;
            background: transparent;
            width: 36px;
            height: 36px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            color: rgba(61, 74, 60, 0.2);
            cursor: pointer;
            transition: color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .icon-button:hover {
            color: var(--color-tertiary);
            background: rgba(156, 65, 61, 0.05);
        }

        .icon-button:active {
            transform: scale(0.9);
        }

        .top-menu-wrap {
            position: relative;
        }

        .settings-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 172px;
            padding: 6px;
            border-radius: 14px;
            border: 1px solid rgba(188, 203, 184, 0.5);
            background: #ffffff;
            box-shadow: 0 12px 28px rgba(19, 30, 20, 0.14);
            display: none;
            z-index: 70;
            font-family: inherit;
        }

        .settings-menu.is-open {
            display: block;
        }

        .settings-menu a {
            display: block;
            width: 100%;
            border-radius: 10px;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.875rem;
            font-family: inherit;
            font-weight: 500;
            line-height: 1.35;
            color: var(--color-on-surface);
            background: transparent;
            cursor: pointer;
            transition: background 0.2s ease;
            text-decoration: none;
        }

        .settings-menu a:hover {
            background: var(--color-surface-high);
        }

        .chevron {
            color: rgba(61, 74, 60, 0.3);
            transition: color 0.2s ease;
        }

        .entry-card:hover .chevron {
            color: var(--color-primary);
        }

        .fab-button {
            position: fixed;
            right: 24px;
            bottom: 112px;
            z-index: 40;
            width: 56px;
            height: 56px;
            border: 0;
            border-radius: 999px;
            display: grid;
            place-items: center;
            color: #ffffff;
            cursor: pointer;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-container));
            transition: transform 0.2s ease;
        }

        .fab-button:active {
            transform: scale(0.9);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 50;
            padding: 12px 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid rgba(188, 203, 184, 0.2);
            border-radius: 24px 24px 0 0;
            backdrop-filter: blur(16px);
            box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.04);
        }

        .nav-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 16px;
            border-radius: 16px;
            color: rgba(19, 30, 20, 0.4);
            transition: color 0.2s ease, transform 0.2s ease, background 0.2s ease;
        }

        .nav-item:hover {
            color: var(--color-primary);
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        .nav-item-active {
            background: rgba(52, 199, 89, 0.1);
            color: var(--color-primary);
        }

        .nav-label {
            margin-top: 4px;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .history-empty {
            padding: 28px;
            border-radius: 24px;
            border: 1px solid rgba(188, 203, 184, 0.25);
            background: #ffffff;
            text-align: center;
            color: rgba(61, 74, 60, 0.8);
        }

        .history-empty h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 800;
            color: var(--color-on-surface);
        }

        .history-empty p {
            margin: 8px 0 0;
            font-size: 0.875rem;
            line-height: 1.45;
        }

        @media (max-width: 420px) {
            .main-content {
                padding-left: 24px;
                padding-right: 24px;
            }

            .selection-row {
                padding-left: 2px;
                padding-right: 2px;
            }
        }
    </style>
</head>

<body>
    <!-- TopAppBar -->
    <header class="top-app-bar">
        <div class="brand-wrap">
            <img class="brand-logo" src="icon-app-ui.png" alt="PlantCam app logo" />

                aria-controls="settingsMenu">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"

                </svg>
            </button>
            <div id="settingsMenu" class="settings-menu" role="menu" aria-label="Settings menu">
                <a id="aboutAppLink" href="about.html" role="menuitem">About App</a>
                <a id="helpLink" href="help.html" role="menuitem">Help/Guide</a>
            </div>
        </div>
    </header>
    <main class="main-content">
        <!-- Search & Filter Section -->
        <section class="search-filter-row">
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" class="search-icon" height="20px" viewBox="0 -960 960 960"
                    width="20px" fill=currentColor>
                    <path
                        d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />

            <button class="filter-button" type="button" aria-label="Filter">

                    fill=currentColor>
                    <path d="M400-240v-80h160v80H400ZM240-440v-80h480v80H240ZM120-640v-80h720v80H120Z" />
                </svg>

        <!-- Selection Action Row -->

                <span class="select-text">Select All</span>
            </label>
            <button class="delete-selected" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"

            <!-- Yesterday Section -->
            <section>
                <div class="day-heading">
                    <h2 class="day-title">Yesterday</h2>

                <div class="entry-list">
                    <div class="entry-card botanical-shadow">
                        <input class="section-checkbox" type="checkbox" />
                        <div class="entry-image-wrap">

    <script>
        (function () {
            var settingsToggle = document.getElementById('settingsToggle');
            var settingsMenu = document.getElementById('settingsMenu');

            if (!settingsToggle || !settingsMenu) {
                return;
            }

            function closeMenu() {
                settingsMenu.classList.remove('is-open');
                settingsToggle.setAttribute('aria-expanded', 'false');
            }

            function openMenu() {
                settingsMenu.classList.add('is-open');
                settingsToggle.setAttribute('aria-expanded', 'true');
            }

            settingsToggle.addEventListener('click', function (event) {
                event.stopPropagation();
                if (settingsMenu.classList.contains('is-open')) {
                    closeMenu();
                } else {
                    openMenu();
                }
            });

            settingsMenu.addEventListener('click', function (event) {
                event.stopPropagation();
            });

            document.addEventListener('click', closeMenu);

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape') {
                    closeMenu();
                }
            });

            var menuLinks = settingsMenu.querySelectorAll('a');
            for (var i = 0; i < menuLinks.length; i++) {
                menuLinks[i].addEventListener('click', closeMenu);
            }
        })();
    </script>
    <script>
        (function () {
            var historySections = document.getElementById('historySections');
            if (!historySections) {
                return;
            }

            function isObject(value) {
                return value !== null && typeof value === 'object' && !Array.isArray(value);
            }

            function isNonPlantLabel(label) {
                return String(label || '').toLowerCase().replace(/[_-]+/g, ' ').indexOf('not a plant') !== -1;
            }

            function isHealthyLabel(label) {
                return String(label || '').toLowerCase().indexOf('healthy') !== -1;
            }

            function formatName(label) {
                var text = String(label || 'Unknown').replace(/[_-]+/g, ' ').trim();
                return text || 'Unknown';
            }

            function escapeHtml(value) {
                return String(value == null ? '' : value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function parsePossibleJson(value) {
                if (typeof value !== 'string') {
                    return value;
                }

                var raw = value.trim();
                if (!raw) {
                    return null;
                }

                try {
                    return JSON.parse(raw);
                } catch (e) {
                    return value;
                }
            }

            function extractQuotedJsonCandidates(text) {
                var candidates = [];
                var inString = false;
                var escaped = false;
                var startQuote = -1;

                for (var i = 0; i < text.length; i++) {
                    var ch = text.charAt(i);

                    if (!inString) {
                        if (ch === '"') {
                            inString = true;
                            startQuote = i;
                            escaped = false;
                        }
                        continue;
                    }

                    if (escaped) {
                        escaped = false;
                        continue;
                    }

                    if (ch === '\\') {
                        escaped = true;
                        continue;
                    }

                    if (ch === '"') {
                        var quoted = text.slice(startQuote, i + 1);
                        inString = false;
                        startQuote = -1;

                        var decoded = '';
                        try {
                            decoded = JSON.parse(quoted);
                        } catch (e) {
                            decoded = quoted.slice(1, -1);
                        }

                        if (decoded.indexOf('{') !== -1 && decoded.indexOf('}') !== -1) {
                            candidates.push(decoded);
                        }
                    }
                }

                return candidates;
            }

            function extractObjectChunks(text) {
                var chunks = [];
                var startIndex = -1;
                var depth = 0;
                var inString = false;
                var escaped = false;

                for (var i = 0; i < text.length; i++) {
                    var ch = text.charAt(i);

                    if (inString) {
                        if (escaped) {
                            escaped = false;
                        } else if (ch === '\\') {
                            escaped = true;
                        } else if (ch === '"') {
                            inString = false;
                        }
                        continue;
                    }

                    if (ch === '"') {
                        inString = true;
                        continue;
                    }

                    if (ch === '{') {
                        if (depth === 0) {
                            startIndex = i;
                        }
                        depth += 1;
                        continue;
                    }

                    if (ch === '}') {
                        if (depth > 0) {
                            depth -= 1;
                            if (depth === 0 && startIndex !== -1) {
                                chunks.push(text.slice(startIndex, i + 1));
                                startIndex = -1;
                            }
                        }
                    }
                }

                return chunks;
            }

            function normalizeHistoryRecord(record) {
                var item = parsePossibleJson(record);

                if (typeof item === 'string') {
                    item = parsePossibleJson(item);
                }

                if (!isObject(item)) {
                    return null;
                }

                var label = formatName(item.label || item.disease || item.name);
                var confidence = Number(item.confidence);
                if (!isFinite(confidence)) {
                    confidence = 0;
                }

                var scannedAt = item.scannedAt || item.datetime || '';
                var date = item.date || '';
                var image = item.image || item.previewImage || '';
                var id = item.id || (String(scannedAt || date || '') + '|' + label + '|' + String(confidence));

                return {
                    id: id,
                    label: label,
                    confidence: Number(confidence.toFixed(2)),
                    scannedAt: scannedAt,
                    date: date,
                    image: image,
                    recommendation: item.recommendation || null
                };
            }

            function normalizeHistoryPayload(payloadText) {
                var raw = String(payloadText || '').trim();
                if (!raw) {
                    return [];
                }

                if (raw.indexOf('HISTORY_DATA|') === 0) {
                    raw = raw.slice('HISTORY_DATA|'.length).trim();
                }

                var parsed = parsePossibleJson(raw);
                var records = [];

                if (Array.isArray(parsed)) {
                    records = parsed;
                } else if (isObject(parsed) && Array.isArray(parsed.history)) {
                    records = parsed.history;
                } else {
                    var chunks = extractObjectChunks(raw);
                    if (chunks.length) {
                        records = chunks;
                    } else {
                        var quotedCandidates = extractQuotedJsonCandidates(raw);
                        records = quotedCandidates.length ? quotedCandidates : [];
                    }
                }

                var normalized = [];
                var seen = {};

                for (var i = 0; i < records.length; i++) {
                    var normalizedRecord = normalizeHistoryRecord(records[i]);
                    if (!normalizedRecord) {
                        continue;
                    }

                    var key = normalizedRecord.id || String(i);
                    if (seen[key]) {
                        continue;
                    }

                    seen[key] = true;
                    normalized.push(normalizedRecord);
                }

                return normalized;
            }

            function recordDate(record) {
                var candidate = record.scannedAt || record.date || '';
                var parsed = new Date(candidate);
                if (!isNaN(parsed.getTime())) {
                    return parsed;
                }
                return new Date();
            }

            function statusText(record) {
                if (isNonPlantLabel(record.label)) {
                    return 'Not A Plant';
                }
                if (isHealthyLabel(record.label)) {
                    return 'Healthy';
                }
                return record.label;
            }

            function statusClass(record) {
                if (isHealthyLabel(record.label) && !isNonPlantLabel(record.label)) {
                    return {
                        dot: 'status-dot-healthy',
                        text: 'status-text-healthy'
                    };
                }

                return {
                    dot: 'status-dot-alert',
                    text: 'status-text-alert'
                };
            }

            function timeLabel(record) {
                var date = recordDate(record);
                try {
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } catch (e) {
                    return '--:--';
                }
            }

            function groupLabel(date) {
                var now = new Date();
                var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                var target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                var daysDiff = Math.floor((today - target) / 86400000);

                if (daysDiff <= 0) {
                    return 'Today';
                }
                if (daysDiff === 1) {
                    return 'Yesterday';
                }
                if (daysDiff <= 7) {
                    return 'Last Week';
                }

                return target.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
            }

            function buildEntryCard(record) {
                var status = statusClass(record);
                var label = escapeHtml(record.label);
                var statusValue = escapeHtml(statusText(record));
                var image = String(record.image || '').trim();
                var imageSrc = image || 'daily-botanical.jpg';

                return '' +
                    '<div class="entry-card botanical-shadow" data-id="' + escapeHtml(record.id) + '">' +
                        '<input class="section-checkbox" type="checkbox" />' +
                        '<div class="entry-image-wrap">' +
                            '<img alt="' + label + '" class="entry-image" src="' + escapeHtml(imageSrc) + '" />' +
                        '</div>' +
                        '<div class="entry-copy">' +
                            '<h3 class="entry-name">' + label + '</h3>' +
                            '<div class="status-stack">' +
                                '<div class="status-row">' +
                                    '<div class="status-dot ' + status.dot + '"></div>' +
                                    '<p class="status-text ' + status.text + '">' + statusValue + '</p>' +
                                '</div>' +
                                '<p class="entry-time">' + escapeHtml(timeLabel(record)) + '</p>' +
                            '</div>' +
                        '</div>' +
                        '<div class="entry-actions">' +
                            '<button class="icon-button" type="button" aria-label="Delete item">' +
                                '<svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor">' +
                                    '<path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z" />' +
                                '</svg>' +
                            '</button>' +
                            '<svg xmlns="http://www.w3.org/2000/svg" height="24px" class="chevron" viewBox="0 -960 960 960" width="24px" fill="currentColor">' +
                                '<path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z" />' +
                            '</svg>' +
                        '</div>' +
                    '</div>';
            }

            function renderEmptyState() {
                historySections.innerHTML =
                    '<section>' +
                        '<div class="history-empty botanical-shadow">' +
                            '<h3>No Scan History Yet</h3>' +
                            '<p>After your first successful scan, it will appear here automatically.</p>' +
                        '</div>' +
                    '</section>';
            }

            function renderHistory(records) {
                if (!records || !records.length) {
                    renderEmptyState();
                    return;
                }

                records.sort(function (a, b) {
                    return recordDate(b).getTime() - recordDate(a).getTime();
                });

                var grouped = {};
                var order = [];

                for (var i = 0; i < records.length; i++) {
                    var label = groupLabel(recordDate(records[i]));
                    if (!grouped[label]) {
                        grouped[label] = [];
                        order.push(label);
                    }
                    grouped[label].push(records[i]);
                }

                var html = '';
                for (var j = 0; j < order.length; j++) {
                    var key = order[j];
                    var items = grouped[key];
                    var cards = '';

                    for (var k = 0; k < items.length; k++) {
                        cards += buildEntryCard(items[k]);
                    }

                    html +=
                        '<section>' +
                            '<div class="day-heading">' +
                                '<h2 class="day-title">' + escapeHtml(key) + '</h2>' +
                                '<span class="day-divider"></span>' +
                            '</div>' +
                            '<div class="entry-list">' + cards + '</div>' +
                        '</section>';
                }

                historySections.innerHTML = html;
            }

            function maybeConsumeBridgeHistory(raw) {
                var text = String(raw || '').trim();
                if (!text) {
                    return false;
                }

                if (text === 'GET_HISTORY' || text === 'OPEN_CAMERA' || text === 'OPEN_GALLERY') {
                    return false;
                }

                if (text.indexOf('IMG_') === 0 || text.indexOf('REQ_CHUNK:') === 0 || text.indexOf('SAVE_HISTORY|') === 0) {
                    return false;
                }

                var records = normalizeHistoryPayload(text);
                renderHistory(records);
                return true;
            }

            function requestHistoryFromBridge() {
                if (!window.AppInventor) {
                    renderEmptyState();
                    return;
                }

                try {
                    window.AppInventor.setWebViewString('GET_HISTORY');
                } catch (e) {
                    renderEmptyState();
                    return;
                }

                var tries = 0;
                var maxTries = 40;
                var watcher = setInterval(function () {
                    tries += 1;

                    var raw = '';
                    try {
                        raw = window.AppInventor.getWebViewString();
                    } catch (e) {
                        raw = '';
                    }

                    if (maybeConsumeBridgeHistory(raw)) {
                        clearInterval(watcher);
                        try {
                            window.AppInventor.setWebViewString('');
                        } catch (e) {
                            // Ignore bridge clear failure.
                        }
                        return;
                    }

                    if (tries >= maxTries) {
                        clearInterval(watcher);
                        renderEmptyState();
                    }
                }, 150);
            }

            requestHistoryFromBridge();
        })();
    </script>
